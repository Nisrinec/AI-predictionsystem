<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.55, user-scalable=yes">
    <title>iPredict | Diagnostic Prédictif - Multi-Sites</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Fix: Remove transform scaling that causes empty space, use viewport meta instead */
        body {
            background: #f0f4f8;
            font-family: 'Inter', sans-serif;
            color: #1a2c3e;
            overflow: hidden;
            height: 100vh;
        }

        .app-layout { 
            display: flex; 
            width: 100%; 
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR - fixed, never scrolls */
        .sidebar {
            width: 320px;
            background: #ffffff;
            border-right: 1px solid #e2edf2;
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.02);
            z-index: 10;
        }

        /* Custom scrollbar for sidebar (optional) */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: #eef2f6;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .brand-area { padding: 28px 24px; border-bottom: 1px solid #ecf3f8; margin-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon { background: #2c9e6b; width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 28px; color: white; }
        .logo-text h2 { font-size: 1.8rem; font-weight: 800; color: #0f2c28; }
        .logo-text p { font-size: 0.75rem; color: #6e8b9b; font-weight: 500; }

        .nav-menu { flex: 1; padding: 0 18px; }
        .nav-item { margin-bottom: 8px; }
        .nav-link { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; color: #3a5a6b; font-weight: 600; font-size: 0.95rem; transition: all 0.2s; cursor: pointer; }
        .nav-link i { width: 24px; font-size: 1.1rem; color: #7f9aa8; }
        .nav-link:hover, .nav-link.active { background: #eaf6f0; color: #2c9e6b; }
        .nav-link.active i { color: #2c9e6b; }

        .dept-main-link { justify-content: space-between; }
        .chevron-icon { transition: transform 0.2s; }
        .department-dropdown {
            margin-top: 8px; margin-left: 32px; padding-left: 16px;
            border-left: 2px solid #e0edf2;
            display: none; flex-direction: column; gap: 8px;
        }
        .department-dropdown.show { display: flex; }
        .dept-item {
            padding: 8px 12px; font-size: 0.85rem; font-weight: 600; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            background: #fafdff; transition: 0.15s;
        }
        .dept-item:hover { background: #eef4f0; }
        .dept-item i:first-child { width: 22px; color: #2c9e6b; }
        .dept-chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.2s; color: #8ba3b2; }

        .pumps-sublist {
            margin-left: 32px; margin-top: 4px; margin-bottom: 6px;
            display: none; flex-direction: column; gap: 6px;
            border-left: 1px dashed #cde0e8; padding-left: 16px;
        }
        .pumps-sublist.show { display: flex; }
        .pump-item {
            padding: 6px 10px; font-size: 0.8rem; font-weight: 500; color: #517e92;
            display: flex; align-items: center; gap: 10px; border-radius: 8px; cursor: pointer;
        }
        .pump-item:hover { background: #eaf6f0; color: #2c9e6b; }
        .pump-status { margin-left: auto; font-size: 0.65rem; background: #eaf2e8; padding: 2px 8px; border-radius: 20px; color: #2c6e4f; }

        .sidebar-footer { padding: 20px 20px 24px; border-top: 1px solid #ecf3f8; font-size: 0.7rem; color: #88a0ae; }

        /* MAIN CONTENT - scrollable area */
        .main-content { 
            flex: 1; 
            padding: 24px 32px; 
            overflow-y: auto;
            height: 100vh;
        }

        /* Custom scrollbar for main content */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 3px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dashboard {
            max-width: 100%;
        }

        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 10px 24px; border-radius: 60px;
            border: 1px solid #eef2f6; margin-bottom: 28px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .search-wrapper { display: flex; align-items: center; background: #f8fafc; border-radius: 48px; padding: 8px 18px; border: 1px solid #e2e8f0; }
        .search-wrapper input { border: none; padding: 6px 12px; font-size: 0.9rem; background: transparent; outline: none; }
        .user-profile { position: relative; }
        .profile-trigger { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 5px 16px 5px 10px; border-radius: 48px; cursor: pointer; border: 1px solid #e2e8f0; }
        .avatar { width: 38px; height: 38px; background: #2c9e6b; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .user-name { font-weight: 700; font-size: 0.9rem; }
        .user-role { font-size: 0.7rem; color: #6f8f9e; }
        .dropdown-menu {
            position: absolute; top: 50px; right: 0; background: white; border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1); width: 200px; display: none; z-index: 100;
            border: 1px solid #eef2f6;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 10px 18px; display: flex; gap: 12px; cursor: pointer; font-size: 0.85rem; }
        .dropdown-item:hover { background: #f5f9fc; }
        .logout-item { border-top: 1px solid #edf2f7; color: #d97777; }

        /* Overall Dashboard Styles */
        .overall-dashboard { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
        .kpi-card { background: white; border-radius: 28px; padding: 1.5rem; border: 1px solid #eef2f6; transition: all 0.2s; }
        .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.1); border-color: #cfe9df; }
        .kpi-icon { width: 48px; height: 48px; border-radius: 24px; background: #eaf6f0; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .kpi-icon i { font-size: 1.5rem; color: #2c9e6b; }
        .kpi-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: #64748b; letter-spacing: 0.5px; margin-bottom: 8px; }
        .kpi-value { font-size: 2rem; font-weight: 800; color: #1e293b; }
        .kpi-trend { font-size: 0.7rem; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
        .trend-up { color: #d97777; }
        .trend-down { color: #2c9e6b; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 1.2rem; font-weight: 700; border-left: 4px solid #2c9e6b; padding-left: 14px; }
        
        .dept-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
        .dept-card { background: white; border-radius: 24px; padding: 1.2rem; border: 1px solid #eef2f6; transition: all 0.2s; cursor: pointer; }
        .dept-card:hover { transform: translateY(-3px); border-color: #cfe9df; box-shadow: 0 8px 20px -8px rgba(0,0,0,0.08); }
        .dept-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .dept-name { font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .dept-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
        .badge-critical { background: #ffe6e5; color: #bc5a4a; }
        .badge-warning { background: #fff0e0; color: #c97e2a; }
        .badge-good { background: #e0f3ea; color: #1d734c; }
        .risk-gauge-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .risk-gauge-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
        .dept-stats { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.7rem; color: #64748b; }
        
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
        .chart-card { background: white; border-radius: 24px; padding: 1.2rem; border: 1px solid #eef2f6; }
        .chart-card h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        canvas { max-height: 200px; width: 100%; }
        
        .alerts-card { background: white; border-radius: 24px; padding: 1.2rem; margin-bottom: 32px; border: 1px solid #eef2f6; }
        .alert-list { margin-top: 12px; }
        .alert-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #edf2f7; }
        .alert-row:last-child { border-bottom: none; }
        .alert-icon { width: 32px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .alert-critical-bg { background: #ffe6e5; color: #d97777; }
        .alert-warning-bg { background: #fff0e0; color: #e6b422; }
        .alert-ok-bg { background: #e0f3ea; color: #2c9e6b; }
        
        .solutions-card { background: white; border-radius: 24px; padding: 1.2rem; border: 1px solid #eef2f6; }
        .solutions-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 12px; }
        .solution-item { background: #f8fafc; border-radius: 16px; padding: 1rem; border-left: 3px solid #2c9e6b; }
        .solution-item h4 { font-size: 0.85rem; font-weight: 800; margin-bottom: 6px; }
        .solution-item p { font-size: 0.7rem; color: #475569; line-height: 1.4; }
        .solution-priority { font-size: 0.65rem; font-weight: 700; margin-top: 8px; color: #c97e2a; }

        /* Pump Dashboard Styles */
        .machine-title {
            background: linear-gradient(135deg, #ffffff 0%, #f9fefb 100%);
            border-radius: 28px; padding: 20px 28px; margin-bottom: 28px;
            border: 1px solid #e2f0e8; display: flex; justify-content: space-between; align-items: center;
        }
        .machine-icon { background: #2c9e6b20; width: 70px; height: 70px; border-radius: 24px; display: flex; align-items: center; justify-content: center; }
        .machine-icon i { font-size: 36px; color: #2c9e6b; }
        .machine-info h1 { font-size: 1.8rem; font-weight: 800; color: #0b2b26; }
        .badge-online { background: #e0f3ea; color: #1d734c; padding: 6px 16px; border-radius: 40px; font-weight: 700; }

        .components-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
        .component-card { background: white; border-radius: 28px; padding: 1.5rem; border: 1px solid #eef2f6; }
        .comp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0f4f8; }
        .comp-name { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .status-good { background: #2c9e6b; box-shadow: 0 0 0 3px #2c9e6b30; }
        .status-warning { background: #e6b422; box-shadow: 0 0 0 3px #e6b42230; }
        .status-critical { background: #d97777; box-shadow: 0 0 0 3px #d9777730; }
        .sensor-group { margin: 12px 0; padding: 8px 0; border-bottom: 1px solid #f0f4f8; }
        .sensor-title { font-size: 0.7rem; font-weight: 600; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        .metric-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.85rem; }
        .metric-label { color: #6f8f9e; font-weight: 500; }
        .metric-value { font-weight: 700; color: #1e2f3a; }
        .progress-bar-bg { background: #e9eef3; border-radius: 20px; height: 6px; margin: 6px 0; }
        .progress-fill { height: 6px; border-radius: 20px; background: #2c9e6b; width: 0%; }
        .risk-low { color: #2c9e6b; font-weight: 600; }
        .risk-medium { color: #e6b422; font-weight: 600; }
        .risk-high { color: #d97777; font-weight: 600; }

        .diagnostic-section { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 28px; border: 1px solid #eef2f6; }
        .section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; border-left: 5px solid #2c9e6b; padding-left: 16px; }
        .problems-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .problem-card { background: #f8fafc; border-radius: 20px; padding: 1rem; border-left: 4px solid; text-align: center; }
        .problem-card .risk-levels { display: flex; justify-content: space-around; gap: 8px; margin-top: 8px; font-size: 0.7rem; }
        .risk-item { flex: 1; text-align: center; padding: 6px 4px; border-radius: 12px; background: white; }
        .risk-critical-text { color: #d97777; }
        .risk-high-text { color: #e6b422; }
        .risk-medium-text { color: #b8860b; }
        .risk-low-text { color: #2c9e6b; }

        .prediction-main { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 28px; border: 1px solid #eef2f6; }
        .filter-buttons { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 24px; border-radius: 40px; border: 1px solid #e2e8f0; background: white; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
        .filter-btn.active { background: #2c9e6b; color: white; border-color: #2c9e6b; }
        .prediction-stats-row { display: flex; justify-content: space-between; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
        .pred-stat-card { flex: 1; background: #f8fafc; border-radius: 16px; padding: 12px; text-align: center; }
        
        .alerts-panel { background: white; border-radius: 24px; padding: 1.2rem; margin-bottom: 28px; border: 1px solid #eef2f6; }
        .alerts-container { background: #fefaf5; border-radius: 20px; padding: 1rem; border-left: 4px solid #e6b422; }
        .alert-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0e6da; font-size: 0.8rem; }
        .alert-item:last-child { border-bottom: none; }
        .alert-critical { color: #d97777; }
        .alert-warning { color: #e6b422; }
        .alert-ok { color: #2c9e6b; }

        .solutions-panel { background: white; border-radius: 24px; padding: 1.2rem; border: 1px solid #eef2f6; }
        .solutions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
        .solution-card { background: #fafdff; border-radius: 20px; padding: 1rem; border: 1px solid #e8f0ed; }
        .solution-icon { background: #e0f3ea; width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .priority { margin-top: 8px; font-size: 0.65rem; font-weight: 700; color: #c97e2a; }

        /* Alerts Dashboard Styles */
        .alerts-dashboard { animation: fadeIn 0.3s ease; }
        .alerts-table-container { background: white; border-radius: 28px; padding: 1.5rem; border: 1px solid #eef2f6; overflow-x: auto; }
        .alerts-table { width: 100%; border-collapse: collapse; }
        .alerts-table th { text-align: left; padding: 14px 12px; background: #f8fafc; font-weight: 700; color: #1e293b; border-bottom: 2px solid #e2e8f0; }
        .alerts-table td { padding: 14px 12px; border-bottom: 1px solid #edf2f7; }
        .alert-row-clickable { cursor: pointer; transition: background 0.2s; }
        .alert-row-clickable:hover { background: #f1f5f9; }
        .severity-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; display: inline-block; }
        .severity-critical { background: #ffe6e5; color: #bc5a4a; }
        .severity-high { background: #fff0e0; color: #c97e2a; }
        .severity-medium { background: #fff8e7; color: #b8860b; }
        .severity-low { background: #e0f3ea; color: #1d734c; }

.profile-horizontal-card { background: white; margin-top: 100px; border: 1px solid #eef2f6; overflow: hidden; }

.error-message { background: #ffe6e5; color: #bc5a4a; }

        .bell-subscribe {
    border: none;
    border-radius: 40px;
    padding: 6px 18px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;

    font-family: inherit;

    transform: translateY(-1px);

}
.bell-icon-btn {
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #f1f5f9;
    color: #334155;

    from {
